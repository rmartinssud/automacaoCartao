<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Automação de PDF</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 24px;
        max-width: 980px;
      }
      fieldset {
        border: 1px solid #ddd;
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input[type="text"],
      input[type="number"],
      select,
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
      }
      textarea {
        min-height: 180px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .grid3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
      }
      .row {
        margin-bottom: 12px;
      }
      .inline {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      .inline label {
        margin: 0;
        font-weight: 500;
      }
      button {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #222;
        background: #222;
        color: #fff;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #result {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fafafa;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }
    </style>
  </head>
  <body>
    <h1>Gerar PDF</h1>

    <fieldset>
      <div class="grid">
        <div class="row">
          <label for="inputFile">Arquivo de entrada</label>
          <select id="inputFile"></select>
        </div>
        <div class="row">
          <label for="outputFile">Arquivo de saída (.pdf)</label>
          <input id="outputFile" type="text" value="cartoes.pdf" />
        </div>
      </div>

      <div class="grid3">
        <div class="row">
          <label for="preset">Predefinição</label>
          <select id="preset">
            <option value="cartao">Cartão (156mm x 110mm)</option>
            <option value="a4">Carta A4 (210mm x 297mm)</option>
          </select>
        </div>
        <div class="row">
          <label for="widthMm">Largura (mm)</label>
          <input id="widthMm" type="number" value="156" step="0.1" />
        </div>
        <div class="row">
          <label for="heightMm">Altura (mm)</label>
          <input id="heightMm" type="number" value="110" step="0.1" />
        </div>
      </div>

      <div class="grid3">
        <div class="row">
          <label for="marginMm">Margem (mm)</label>
          <input id="marginMm" type="number" value="8" step="0.1" />
        </div>
        <div class="row">
          <label for="titleFontSizePt">Tamanho da fonte do título (pt)</label>
          <input id="titleFontSizePt" type="number" value="14" step="1" min="6" max="72" />
        </div>
        <div class="row">
          <label for="titleFontStyle">Estilo da fonte do título</label>
          <select id="titleFontStyle">
            <option value="bold">Negrito</option>
            <option value="normal">Normal</option>
            <option value="italic">Itálico</option>
            <option value="bold_italic">Negrito + itálico</option>
          </select>
        </div>
        <div class="row inline">
          <label><input id="includeTitle" type="checkbox" checked /> Incluir título</label>
        </div>
        <div class="row inline">
          <label><input id="onlyName" type="checkbox" /> Usar somente nome (última linha)</label>
        </div>
      </div>

      <div class="grid3">
        <div class="row">
          <label for="titleTextAlign">Alinhamento do título</label>
          <select id="titleTextAlign">
            <option value="left" selected>Esquerda</option>
            <option value="center">Centro</option>
            <option value="right">Direita</option>
          </select>
        </div>
        <div class="row">
          <label for="bodyTextAlign">Alinhamento do texto principal</label>
          <select id="bodyTextAlign">
            <option value="left" selected>Esquerda</option>
            <option value="center">Centro</option>
            <option value="right">Direita</option>
          </select>
        </div>
        <div class="row">
          <label for="bodyLineHeight">Espaçamento entre linhas (multiplicador) (texto principal)</label>
          <input id="bodyLineHeight" type="number" value="1.25" step="0.05" min="0.8" max="6" />
        </div>
        <div class="row">
          <label for="titleBodyGapMm">Espaço entre título e texto (mm)</label>
          <input id="titleBodyGapMm" type="number" value="6" step="0.5" min="0" max="100" />
        </div>
        <div class="row">
          <label for="headerContentGapMm">Espaço entre cabeçalho e conteúdo (mm)</label>
          <input id="headerContentGapMm" type="number" value="0" step="0.5" min="0" max="100" />
        </div>
      </div>

      <div class="grid3">
        <div class="row">
          <label for="footerContentGapMm">Espaço entre conteúdo e rodapé (mm)</label>
          <input id="footerContentGapMm" type="number" value="0" step="0.5" min="0" max="100" />
        </div>
      </div>
    </fieldset>

    <fieldset>
      <div class="row inline">
        <label><input id="standardizeTitleHeader" type="checkbox" /> Padronizar cabeçalho/título por gênero</label>
      </div>
      <div class="grid3">
        <div class="row">
          <label for="defaultGender">Gênero padrão</label>
          <select id="defaultGender">
            <option value="auto" selected>Automático</option>
            <option value="masc">Masculino</option>
            <option value="fem">Feminino</option>
          </select>
        </div>
      </div>
      <div class="grid">
        <div class="row">
          <label for="forcedFemaleNames">Forçar feminino (nomes, um por linha)</label>
          <textarea id="forcedFemaleNames" spellcheck="false"></textarea>
        </div>
        <div class="row">
          <label for="forcedMaleNames">Forçar masculino (nomes, um por linha)</label>
          <textarea id="forcedMaleNames" spellcheck="false"></textarea>
        </div>
      </div>
    </fieldset>
    <fieldset>
      <div class="row inline">
        <label><input id="headerEnabled" type="checkbox" /> Incluir cabeçalho</label>
      </div>
      <div class="grid">
        <div class="row">
          <label for="headerLeftImage">Imagem esquerda (cabeçalho)</label>
          <input id="headerLeftImage" type="file" accept="image/*" />
        </div>
        <div class="row">
          <label for="headerRightImage">Imagem direita (cabeçalho)</label>
          <input id="headerRightImage" type="file" accept="image/*" />
        </div>
      </div>
      <div class="grid3">
        <div class="row">
          <label for="headerTextAlign">Alinhamento do texto (cabeçalho)</label>
          <select id="headerTextAlign">
            <option value="left">Esquerda</option>
            <option value="center" selected>Centro</option>
            <option value="right">Direita</option>
          </select>
        </div>
        <div class="row">
          <label for="headerImageBoxWidthMm">Largura do espaço da imagem (mm) (cabeçalho)</label>
          <input id="headerImageBoxWidthMm" type="number" value="0" step="0.5" min="0" max="300" />
        </div>
        <div class="row">
          <label for="headerImageBoxHeightMm">Altura do espaço da imagem (mm) (cabeçalho)</label>
          <input id="headerImageBoxHeightMm" type="number" value="0" step="0.5" min="0" max="300" />
        </div>
      </div>

      <div class="grid3">
        <div class="row">
          <label for="headerImageAlignX">Alinhamento horizontal da imagem (cabeçalho)</label>
          <select id="headerImageAlignX">
            <option value="left">Esquerda</option>
            <option value="center" selected>Centro</option>
            <option value="right">Direita</option>
          </select>
        </div>
        <div class="row">
          <label for="headerImageAlignY">Alinhamento vertical da imagem (cabeçalho)</label>
          <select id="headerImageAlignY">
            <option value="top">Topo</option>
            <option value="middle" selected>Meio</option>
            <option value="bottom">Base</option>
          </select>
        </div>
        <div class="row">
          <label for="headerFontSizePt">Tamanho da fonte (pt) (cabeçalho)</label>
          <input id="headerFontSizePt" type="number" value="10" step="1" min="6" max="72" />
        </div>
        <div class="row">
          <label for="headerFontStyle">Estilo da fonte (cabeçalho)</label>
          <select id="headerFontStyle">
            <option value="normal">Normal</option>
            <option value="bold">Negrito</option>
            <option value="italic">Itálico</option>
            <option value="bold_italic">Negrito + itálico</option>
          </select>
        </div>
      </div>
      <div class="grid3">
        <div class="row">
          <label for="headerLineHeight">Espaçamento entre linhas (cabeçalho)</label>
          <input id="headerLineHeight" type="number" value="1.2" step="0.1" min="0.8" max="3" />
        </div>
      </div>
      <div class="row">
        <label for="headerTextTemplate">Texto (cabeçalho)</label>
        <div class="row">
          <div>Usar <code>{{titulo}}</code> e <code>{{nome}}</code> quando precisar.</div>
        </div>
        <textarea id="headerTextTemplate" spellcheck="false"></textarea>
      </div>
    </fieldset>

    <fieldset>
      <div class="row inline">
        <label><input id="footerEnabled" type="checkbox" /> Incluir rodapé</label>
      </div>
      <div class="grid">
        <div class="row">
          <label for="footerLeftImage">Imagem esquerda (rodapé)</label>
          <input id="footerLeftImage" type="file" accept="image/*" />
        </div>
        <div class="row">
          <label for="footerRightImage">Imagem direita (rodapé)</label>
          <input id="footerRightImage" type="file" accept="image/*" />
        </div>
      </div>
      <div class="grid3">
        <div class="row">
          <label for="footerTextAlign">Alinhamento do texto (rodapé)</label>
          <select id="footerTextAlign">
            <option value="left">Esquerda</option>
            <option value="center" selected>Centro</option>
            <option value="right">Direita</option>
          </select>
        </div>
        <div class="row">
          <label for="footerImageBoxWidthMm">Largura do espaço da imagem (mm) (rodapé)</label>
          <input id="footerImageBoxWidthMm" type="number" value="0" step="0.5" min="0" max="300" />
        </div>
        <div class="row">
          <label for="footerImageBoxHeightMm">Altura do espaço da imagem (mm) (rodapé)</label>
          <input id="footerImageBoxHeightMm" type="number" value="0" step="0.5" min="0" max="300" />
        </div>
      </div>

      <div class="grid3">
        <div class="row">
          <label for="footerImageAlignX">Alinhamento horizontal da imagem (rodapé)</label>
          <select id="footerImageAlignX">
            <option value="left">Esquerda</option>
            <option value="center" selected>Centro</option>
            <option value="right">Direita</option>
          </select>
        </div>
        <div class="row">
          <label for="footerImageAlignY">Alinhamento vertical da imagem (rodapé)</label>
          <select id="footerImageAlignY">
            <option value="top">Topo</option>
            <option value="middle" selected>Meio</option>
            <option value="bottom">Base</option>
          </select>
        </div>
        <div class="row">
          <label for="footerFontSizePt">Tamanho da fonte (pt) (rodapé)</label>
          <input id="footerFontSizePt" type="number" value="10" step="1" min="6" max="72" />
        </div>
        <div class="row">
          <label for="footerFontStyle">Estilo da fonte (rodapé)</label>
          <select id="footerFontStyle">
            <option value="normal">Normal</option>
            <option value="bold">Negrito</option>
            <option value="italic">Itálico</option>
            <option value="bold_italic">Negrito + itálico</option>
          </select>
        </div>
      </div>
      <div class="grid3">
        <div class="row">
          <label for="footerLineHeight">Espaçamento entre linhas (rodapé)</label>
          <input id="footerLineHeight" type="number" value="1.2" step="0.1" min="0.8" max="3" />
        </div>
      </div>
      <div class="row">
        <label for="footerTextTemplate">Texto (rodapé)</label>
        <div class="row">
          <div>Usar <code>{{titulo}}</code> e <code>{{nome}}</code> quando precisar.</div>
        </div>
        <textarea id="footerTextTemplate" spellcheck="false"></textarea>
      </div>
    </fieldset>

    <fieldset>
      <div class="row">
        <label for="removals">Remover do título (um por linha)</label>
        <textarea id="removals" spellcheck="false"></textarea>
      </div>

      <div class="row">
        <label for="bodyTemplate">Texto do corpo</label>
        <div class="row">
          <div>Usar <code>{{titulo}}</code> e <code>{{nome}}</code> quando precisar.</div>
        </div>
        <textarea id="bodyTemplate" spellcheck="false"></textarea>
      </div>
    </fieldset>

    <div class="row inline">
      <button id="generateBtn">Gerar</button>
      <button id="previewBtn">Gerar exemplo</button>
      <div id="status"></div>
    </div>

    <div class="row">
      <progress id="progressBar" value="0" max="100" style="width: 100%"></progress>
      <div id="progressText"></div>
    </div>

    <div id="result" class="row"></div>

    <script>
      const defaultBody =
        "Tenho a honra de dirigir-me a Vossa Excelência para pedir vênia ao meu propósito de inscrição à vacância da Cadeira Número Dezessete, da Secção de Medicina, da Egrégia Academia Nacional de Medicina, patronímica de Carlos Pinto Seidl, ocupada pelo inesquecível Acadêmico Professor Dr. Omar da Rosa Santos, por quem sentíamos especial respeito e carinho.\n" +
        "A presença nas reuniões de quintas-feiras, durante os vários anos, muito serviu ao meu conhecimento médico e permitiu conhecer pessoalmente a todos, admirando cada um.\n" +
        "Ao inscrever-me para esse conclave prevaleceu meu espírito acadêmico, que sonha um dia poder equiparar-se à magnitude dos pares acadêmicos que formam o notável colegiado da Academia Nacional de Medicina.\n" +
        "Senhor Acadêmico, solicitarei em breve a Vossa Excelência a permissão de uma visita de apresentação.\n" +
        "Atenciosamente\n" +
        "Luiz Werber-Bandeira";

      const el = (id) => document.getElementById(id);
      const inputFile = el("inputFile");
      const outputFile = el("outputFile");
      const preset = el("preset");
      const widthMm = el("widthMm");
      const heightMm = el("heightMm");
      const marginMm = el("marginMm");
      const titleFontSizePt = el("titleFontSizePt");
      const titleFontStyle = el("titleFontStyle");
      const titleTextAlign = el("titleTextAlign");
      const bodyTextAlign = el("bodyTextAlign");
      const bodyLineHeight = el("bodyLineHeight");
      const titleBodyGapMm = el("titleBodyGapMm");
      const headerContentGapMm = el("headerContentGapMm");
      const footerContentGapMm = el("footerContentGapMm");
      const headerEnabled = el("headerEnabled");
      const headerLeftImage = el("headerLeftImage");
      const headerRightImage = el("headerRightImage");
      const headerTextTemplate = el("headerTextTemplate");
      const headerTextAlign = el("headerTextAlign");
      const headerImageBoxWidthMm = el("headerImageBoxWidthMm");
      const headerImageBoxHeightMm = el("headerImageBoxHeightMm");
      const headerImageAlignX = el("headerImageAlignX");
      const headerImageAlignY = el("headerImageAlignY");
      const headerFontSizePt = el("headerFontSizePt");
      const headerFontStyle = el("headerFontStyle");
      const headerLineHeight = el("headerLineHeight");
      const footerEnabled = el("footerEnabled");
      const footerLeftImage = el("footerLeftImage");
      const footerRightImage = el("footerRightImage");
      const footerTextTemplate = el("footerTextTemplate");
      const footerTextAlign = el("footerTextAlign");
      const footerImageBoxWidthMm = el("footerImageBoxWidthMm");
      const footerImageBoxHeightMm = el("footerImageBoxHeightMm");
      const footerImageAlignX = el("footerImageAlignX");
      const footerImageAlignY = el("footerImageAlignY");
      const footerFontSizePt = el("footerFontSizePt");
      const footerFontStyle = el("footerFontStyle");
      const footerLineHeight = el("footerLineHeight");
      const includeTitle = el("includeTitle");
      const onlyName = el("onlyName");
      const removals = el("removals");
      const bodyTemplate = el("bodyTemplate");
      const status = el("status");
      const progressBar = el("progressBar");
      const progressText = el("progressText");
      const result = el("result");
      const generateBtn = el("generateBtn");
      const previewBtn = el("previewBtn");

      const standardizeTitleHeader = el("standardizeTitleHeader");
      const defaultGender = el("defaultGender");
      const forcedFemaleNames = el("forcedFemaleNames");
      const forcedMaleNames = el("forcedMaleNames");

      let headerLeftImageDataUrl = "";
      let headerRightImageDataUrl = "";
      let footerLeftImageDataUrl = "";
      let footerRightImageDataUrl = "";

      function readImageAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = () => reject(new Error("Falhar ao ler imagem."));
          reader.onload = () => resolve(String(reader.result || ""));
          reader.readAsDataURL(file);
        });
      }

      headerLeftImage.addEventListener("change", async () => {
        const f = headerLeftImage.files && headerLeftImage.files[0];
        headerLeftImageDataUrl = f ? await readImageAsDataUrl(f) : "";
      });
      headerRightImage.addEventListener("change", async () => {
        const f = headerRightImage.files && headerRightImage.files[0];
        headerRightImageDataUrl = f ? await readImageAsDataUrl(f) : "";
      });
      footerLeftImage.addEventListener("change", async () => {
        const f = footerLeftImage.files && footerLeftImage.files[0];
        footerLeftImageDataUrl = f ? await readImageAsDataUrl(f) : "";
      });
      footerRightImage.addEventListener("change", async () => {
        const f = footerRightImage.files && footerRightImage.files[0];
        footerRightImageDataUrl = f ? await readImageAsDataUrl(f) : "";
      });

      function setPreset(value) {
        if (value === "a4") {
          widthMm.value = "210";
          heightMm.value = "297";
          marginMm.value = "20";
          outputFile.value = outputFile.value.endsWith(".pdf") ? outputFile.value : "carta.pdf";
        } else {
          widthMm.value = "156";
          heightMm.value = "110";
          marginMm.value = "8";
          outputFile.value = outputFile.value.endsWith(".pdf") ? outputFile.value : "cartoes.pdf";
        }
      }

      preset.addEventListener("change", () => setPreset(preset.value));

      async function loadInputs() {
        const r = await fetch("/api/inputs");
        const data = await r.json();
        inputFile.innerHTML = "";
        for (const file of data.files || []) {
          const opt = document.createElement("option");
          opt.value = file;
          opt.textContent = file;
          inputFile.appendChild(opt);
        }
        if ([...inputFile.options].some((o) => o.value === "academia.txt")) {
          inputFile.value = "academia.txt";
        }
      }

      function sleep(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }

      function setBusy(isBusy) {
        generateBtn.disabled = isBusy;
        previewBtn.disabled = isBusy;
      }

      function buildPayload(mode) {
        const removalLines = (removals.value || "")
          .split(/\r?\n/g)
          .map((l) => l.trim())
          .filter(Boolean);

        const outputName =
          mode === "preview"
            ? (outputFile.value.toLowerCase().startsWith("preview-")
                ? outputFile.value
                : `preview-${outputFile.value}`)
            : outputFile.value;

        const listFromText = (text) =>
          (text || "")
            .split(/\r?\n/g)
            .map((l) => l.trim())
            .filter(Boolean);

        return {
          mode,
          inputFile: inputFile.value,
          outputFile: outputName,
          preset: preset.value,
          widthMm: Number(widthMm.value),
          heightMm: Number(heightMm.value),
          marginMm: Number(marginMm.value),
          titleFontSizePt: Number(titleFontSizePt.value),
          titleFontStyle: titleFontStyle.value,
          titleTextAlign: titleTextAlign.value,
          bodyTextAlign: bodyTextAlign.value,
          bodyLineHeight: Number(bodyLineHeight.value),
          titleBodyGapMm: Number(titleBodyGapMm.value),
          headerContentGapMm: Number(headerContentGapMm.value),
          footerContentGapMm: Number(footerContentGapMm.value),
          headerEnabled: Boolean(headerEnabled.checked),
          headerImageBoxWidthMm: Number(headerImageBoxWidthMm.value),
          headerImageBoxHeightMm: Number(headerImageBoxHeightMm.value),
          headerImageAlignX: headerImageAlignX.value,
          headerImageAlignY: headerImageAlignY.value,
          headerLeftImageDataUrl,
          headerRightImageDataUrl,
          headerTextTemplate: headerTextTemplate.value || "",
          headerTextAlign: headerTextAlign.value,
          headerFontSizePt: Number(headerFontSizePt.value),
          headerFontStyle: headerFontStyle.value,
          headerLineHeight: Number(headerLineHeight.value),
          footerEnabled: Boolean(footerEnabled.checked),
          footerImageBoxWidthMm: Number(footerImageBoxWidthMm.value),
          footerImageBoxHeightMm: Number(footerImageBoxHeightMm.value),
          footerImageAlignX: footerImageAlignX.value,
          footerImageAlignY: footerImageAlignY.value,
          footerLeftImageDataUrl,
          footerRightImageDataUrl,
          footerTextTemplate: footerTextTemplate.value || "",
          footerTextAlign: footerTextAlign.value,
          footerFontSizePt: Number(footerFontSizePt.value),
          footerFontStyle: footerFontStyle.value,
          footerLineHeight: Number(footerLineHeight.value),
          bodyTemplate: bodyTemplate.value || "",
          removals: removalLines,
          onlyName: Boolean(onlyName.checked),
          includeTitle: Boolean(includeTitle.checked),
          standardizeTitleHeader: Boolean(standardizeTitleHeader.checked),
          defaultGender: defaultGender.value,
          forcedFemaleNames: listFromText(forcedFemaleNames.value),
          forcedMaleNames: listFromText(forcedMaleNames.value),
        };
      }

      async function readJsonOrTextError(r, fallbackMessage) {
        const contentType = (r.headers.get("content-type") || "").toLowerCase();
        if (contentType.includes("application/json")) return await r.json();
        const text = await r.text();
        const hint =
          "O servidor provavelmente não está atualizado (endpoint /api/job) ou a página não foi aberta pela interface.\n" +
          "Rodar: npm run ui e abrir a URL exibida no terminal.";
        throw new Error(
          `${fallbackMessage} (HTTP ${r.status}).\n\n${hint}\n\nResposta:\n${String(text).slice(0, 300)}`,
        );
      }

      async function runJob(mode) {
        result.textContent = "";
        status.textContent = mode === "preview" ? "Gerar exemplo..." : "Gerar...";
        progressBar.value = 0;
        progressText.textContent = "";
        setBusy(true);
        try {
          const payload = buildPayload(mode);

          const r = await fetch("/api/job", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await readJsonOrTextError(r, "Falhar ao iniciar geração");
          if (!r.ok) throw new Error(data.error || `Falhar ao iniciar geração (HTTP ${r.status}).`);

          const jobId = data.jobId;
          if (!jobId) throw new Error("Job não iniciar.");

          while (true) {
            const jr = await fetch(`/api/job/${encodeURIComponent(jobId)}`);
            const job = await readJsonOrTextError(jr, "Falhar ao checar progresso");
            if (!jr.ok) throw new Error(job.error || `Falhar ao checar progresso (HTTP ${jr.status}).`);

            progressBar.value = Number(job.percent || 0);
            progressText.textContent = job.message || "";

            if (job.status === "done") {
              const a = document.createElement("a");
              a.href = job.result.downloadUrl;
              a.textContent = "Baixar PDF";

              result.innerHTML =
                "<div><strong>Gerar concluído</strong></div>" +
                `<div>Arquivo: ${job.result.outputFile}</div>` +
                `<div>Total encontrado: ${job.result.stats.totalTitlesFound}</div>` +
                `<div>Gerado: ${job.result.stats.uniqueCardsGenerated}</div>` +
                `<div>Repetidos removidos: ${job.result.stats.duplicatesRemoved}</div>`;
              result.appendChild(document.createElement("div")).appendChild(a);
              status.textContent = "";
              break;
            }

            if (job.status === "error") {
              throw new Error(job.error || "Erro ao gerar.");
            }

            await sleep(500);
          }
        } catch (e) {
          status.textContent = "";
          progressText.textContent = "";
          result.textContent = e instanceof Error ? e.message : String(e);
        } finally {
          setBusy(false);
        }
      }

      generateBtn.addEventListener("click", (ev) => {
        ev.preventDefault();
        runJob("full");
      });

      previewBtn.addEventListener("click", (ev) => {
        ev.preventDefault();
        runJob("preview");
      });

      removals.value = "EXMO. SENHOR ACADÊMICO\nPROFESSOR DOUTOR";
      headerTextTemplate.value = "";
      footerTextTemplate.value = "";
      bodyTemplate.value = defaultBody;
      setPreset(preset.value);
      loadInputs();
      forcedFemaleNames.value = "Fernanda Freire Tovar-Moll";
      fetch("/api/health")
        .then((r) => r.json())
        .then((h) => {
          if (!h || h.hasJob !== true) {
            result.textContent =
              "Servidor não está atualizado para suportar jobs (/api/job). Rodar: npm run ui e abrir a URL do terminal.";
          }
        })
        .catch(() => {
          result.textContent =
            "Servidor não está atualizado para suportar jobs (/api/job). Rodar: npm run ui e abrir a URL do terminal.";
        });
    </script>
  </body>
</html>
